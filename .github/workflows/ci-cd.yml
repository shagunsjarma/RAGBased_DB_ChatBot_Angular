name: RAG ChatBOT CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (Python Validation)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Code Syntax
      run: |
        python -m py_compile $(find app/ -name "*.py")

    - name: Run Unit Tests
      env:
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        REDIS_URL: "redis://localhost:6379/0"
        QDRANT_URL: "http://localhost:6333"
        QDRANT_COLLECTION: "test_schema_embeddings"
        GEMINI_API_KEY: "mock-api-key"
      run: |
        # Run backend tests
        python -m pytest app/tests/unit -v

  frontend-ci:
    name: Frontend CI (Angular Compilation)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Verify Production Compilation
      run: |
        cd frontend
        npm run build -- --configuration=production
